name: Quality Gate

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop
      - main

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-quality:
    name: backend-quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run build

      - name: Tests
        run: npm test

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  frontend-quality:
    name: frontend-quality
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Tests
        run: npm test

      - name: npm audit (high+)
        run: npm audit --audit-level=high

  backend-integration:
    name: backend-integration
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2022-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_SA_PASSWORD: TestPassword123!
        ports:
          - 1433:1433
    defaults:
      run:
        working-directory: backend
    env:
      RUN_DB_INTEGRATION_TESTS: "true"
      FRONTEND_URL: http://localhost:5173
      TZ: America/Argentina/Buenos_Aires
      DB_HOST: localhost
      DB_PORT: 1433
      DB_NAME: dinamic_attendance
      DB_USER: sa
      DB_PASSWORD: TestPassword123!
      DB_ENCRYPT: "false"
      DB_TRUST_SERVER_CERTIFICATE: "true"
      JWT_SECRET: ci-jwt-secret-min-16-chars
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wait for SQL Server
        run: |
          for i in $(seq 1 30); do
            if docker run --rm --network host mcr.microsoft.com/mssql-tools \
              /opt/mssql-tools/bin/sqlcmd \
              -S localhost -U sa -P "$DB_PASSWORD" \
              -Q "SELECT 1" -C >/dev/null 2>&1; then
              echo "SQL Server is ready"
              exit 0
            fi
            echo "Waiting for SQL Server (${i}/30)..."
            sleep 5
          done
          echo "SQL Server did not become ready in time"
          exit 1

      - name: Create database
        run: |
          docker run --rm --network host mcr.microsoft.com/mssql-tools \
            /opt/mssql-tools/bin/sqlcmd \
            -S localhost -U sa -P "$DB_PASSWORD" \
            -Q "IF DB_ID('$DB_NAME') IS NULL CREATE DATABASE [$DB_NAME]" -C

      - name: Run migrations
        run: npm run migrate

      - name: Integration tests
        run: npm run test:integration

  audit-artifacts:
    name: audit-artifacts
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - frontend-quality
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root dependencies
        run: npm ci

      - name: Install backend dependencies
        run: npm ci --prefix backend

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run local audit (non-blocking findings)
        run: npm run audit
        continue-on-error: true

      - name: Enforce strict quality gate on critical checks
        run: python3 scripts/audit/enforce_quality_gate.py --strict

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-report
          path: |
            audit/audit-summary.md
            audit/audit-status.json
            audit/raw/
