name: Deploy Frontend (develop)

on:
  push:
    branches:
      - develop
    paths:
      - "frontend/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-frontend.yml"
      - ".github/scripts/deploy-frontend.sh"
      - ".github/scripts/deploy-compose.sh"

concurrency:
  group: dinamic-attendance-deploy-develop
  cancel-in-progress: false

jobs:
  validate:
    name: frontend-validation
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm test

  deploy:
    name: deploy-frontend
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          timeout: 30s
          command_timeout: 30m
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "${DEPLOY_PATH}" ]; then
              DEPLOY_PATH="/opt/dinamic-attendance/dinamic-localizador"
            fi
            # Bootstrap: sync deploy scripts before the locked deploy entrypoint runs.
            cd "${DEPLOY_PATH}"
            git fetch origin develop
            git checkout develop
            git reset --hard origin/develop
            export DEPLOY_PATH
            export DEPLOY_BRANCH="develop"
            export DEPLOY_FRONTEND_HEALTH_URL="${{ vars.DEPLOY_FRONTEND_HEALTH_URL }}"
            bash "${DEPLOY_PATH}/.github/scripts/deploy-frontend.sh"
