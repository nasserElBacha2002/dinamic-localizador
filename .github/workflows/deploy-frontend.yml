name: Deploy Frontend (develop)

on:
  push:
    branches:
      - develop
    paths:
      - "frontend/**"
      - "docker-compose.yml"
      - "docker-compose.prod.yml"
      - ".github/workflows/deploy-frontend.yml"
      - ".github/scripts/deploy-frontend.sh"
      - ".github/scripts/deploy-compose.sh"

concurrency:
  group: dinamic-attendance-deploy-develop
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: build-and-push-frontend-image
    runs-on: ubuntu-latest
    outputs:
      frontend_image: ${{ steps.image.outputs.frontend_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase GHCR image name
        id: image
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY}/frontend"
          IMAGE_NAME="$(echo "${IMAGE_NAME}" | tr '[:upper:]' '[:lower:]')"
          echo "image_name=${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"
          echo "frontend_image=${IMAGE_NAME}:${GITHUB_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend production image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          target: production
          push: true
          tags: |
            ${{ steps.image.outputs.image_name }}:${{ github.sha }}
            ${{ steps.image.outputs.image_name }}:develop-latest
          build-args: |
            VITE_API_URL=${{ vars.VITE_API_URL }}
            VITE_GOOGLE_MAPS_API_KEY=${{ vars.VITE_GOOGLE_MAPS_API_KEY }}
            VITE_GOOGLE_MAPS_MAP_ID=${{ vars.VITE_GOOGLE_MAPS_MAP_ID }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy-frontend
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    env:
      FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
      GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
      GHCR_PULL_USERNAME: ${{ github.repository_owner }}
    steps:
      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          FRONTEND_IMAGE: ${{ needs.build-and-push.outputs.frontend_image }}
          GHCR_PULL_TOKEN: ${{ secrets.GHCR_PULL_TOKEN }}
          GHCR_PULL_USERNAME: ${{ github.repository_owner }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script_stop: true
          timeout: 30s
          command_timeout: 15m
          envs: FRONTEND_IMAGE,GHCR_PULL_TOKEN,GHCR_PULL_USERNAME
          script: |
            set -euo pipefail
            DEPLOY_PATH="${{ secrets.DEPLOY_PATH }}"
            if [ -z "${DEPLOY_PATH}" ]; then
              DEPLOY_PATH="/opt/dinamic-attendance/dinamic-localizador"
            fi
            cd "${DEPLOY_PATH}"
            git fetch origin develop
            git checkout develop
            git reset --hard origin/develop
            export DEPLOY_PATH
            export DEPLOY_BRANCH="develop"
            export DEPLOY_FRONTEND_HEALTH_URL="${{ vars.DEPLOY_FRONTEND_HEALTH_URL }}"
            bash "${DEPLOY_PATH}/.github/scripts/deploy-frontend.sh"
