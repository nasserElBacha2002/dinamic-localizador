name: PR Validation

on:
  pull_request:
    branches:
      - develop
      - main

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  docker-validation:
    name: docker-validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Compose config
        run: |
          cp .env.example .env

          replace_if_empty() {
            local key="$1"
            local value="$2"
            if grep -qE "^${key}=$" .env; then
              sed -i "s|^${key}=.*|${key}=${value}|" .env
            fi
          }

          replace_if_empty DB_PASSWORD ci-db-password
          replace_if_empty JWT_SECRET ci-jwt-secret-min-16-chars
          replace_if_empty TWILIO_ACCOUNT_SID ci-twilio-account-sid
          replace_if_empty TWILIO_AUTH_TOKEN ci-twilio-auth-token
          replace_if_empty TWILIO_WHATSAPP_NUMBER whatsapp:+10000000000
          replace_if_empty TWILIO_WEBHOOK_URL https://example.com/api/whatsapp/webhook
          replace_if_empty TWILIO_ARRIVAL_REMINDER_CONTENT_SID HX00000000000000000000000000000001
          replace_if_empty TWILIO_EXIT_REMINDER_CONTENT_SID HX00000000000000000000000000000002

          sed -i 's|^NODE_ENV=.*|NODE_ENV=production|' .env
          sed -i 's|^TWILIO_VALIDATE_SIGNATURE=.*|TWILIO_VALIDATE_SIGNATURE=true|' .env

          echo "FRONTEND_IMAGE=ghcr.io/example-org/dinamic-localizador/frontend:ci" >> .env

          docker compose \
            --env-file .env \
            -f docker-compose.yml \
            -f docker-compose.prod.yml \
            config > /dev/null

          rm -f .env
