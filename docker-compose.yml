name: dinamic-attendance

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: dinamic-attendance-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    expose:
      - "${DB_PORT}"
    ports:
      - "1435:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -Q \"SELECT 1\" -C || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 20s

  db-init:
    image: mcr.microsoft.com/mssql-tools
    container_name: dinamic-attendance-db-init
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      DB_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./database/init/init.sql:/init/init.sql:ro
    command:
      - /bin/bash
      - -c
      - >
        /opt/mssql-tools/bin/sqlcmd
        -S sqlserver
        -U sa
        -P "$${DB_PASSWORD}"
        -C
        -i /init/init.sql
    restart: "no"

  migrations:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: migrations
    container_name: dinamic-attendance-migrations
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV}
      TZ: ${TZ}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ENCRYPT: ${DB_ENCRYPT}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE}
      MIGRATIONS_DIR: /database/migrations
    volumes:
      - ./database:/database:ro
    command: ["npm", "run", "migrate"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: dinamic-attendance-backend
    depends_on:
      sqlserver:
        condition: service_healthy
      db-init:
        condition: service_completed_successfully
      migrations:
        condition: service_completed_successfully
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${BACKEND_INTERNAL_PORT}
      TZ: ${TZ}
      FRONTEND_URL: ${FRONTEND_URL}
      APP_BASE_URL: ${APP_BASE_URL}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_ENCRYPT: ${DB_ENCRYPT}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER}
      TWILIO_WEBHOOK_URL: ${TWILIO_WEBHOOK_URL}
      TWILIO_VALIDATE_SIGNATURE: ${TWILIO_VALIDATE_SIGNATURE}
      TWILIO_ARRIVAL_REMINDER_CONTENT_SID: ${TWILIO_ARRIVAL_REMINDER_CONTENT_SID}
      TWILIO_EXIT_REMINDER_CONTENT_SID: ${TWILIO_EXIT_REMINDER_CONTENT_SID}
      TWILIO_TEMPLATE_NO_CHECKIN_SID: ${TWILIO_TEMPLATE_NO_CHECKIN_SID}
      ATTENDANCE_REMINDER_JOB_ENABLED: ${ATTENDANCE_REMINDER_JOB_ENABLED:-true}
      BOT_SESSION_TTL_MINUTES: ${BOT_SESSION_TTL_MINUTES}
      BOT_OPERATION_TIMEZONE: ${BOT_OPERATION_TIMEZONE}
      BOT_DEFAULT_RADIUS_METERS: ${BOT_DEFAULT_RADIUS_METERS}
      BOT_GEOFENCE_REVIEW_MARGIN_METERS: ${BOT_GEOFENCE_REVIEW_MARGIN_METERS}
      BOT_ON_TIME_GRACE_MINUTES: ${BOT_ON_TIME_GRACE_MINUTES}
    ports:
      - "${BACKEND_HOST_PORT}:${BACKEND_INTERNAL_PORT}"
   # volumes:
     # - ./backend:/app
     # - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
        VITE_GOOGLE_MAPS_MAP_ID: ${VITE_GOOGLE_MAPS_MAP_ID}
    container_name: dinamic-attendance-frontend
    depends_on:
      backend:
        condition: service_started
    environment:
      VITE_API_URL: ${VITE_API_URL}
      VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
      VITE_GOOGLE_MAPS_MAP_ID: ${VITE_GOOGLE_MAPS_MAP_ID}
    ports:
      - "${FRONTEND_HOST_PORT}:80"
    #volumes:
     # - ./frontend:/app
      #- /app/node_modules6
volumes:
  sqlserver_data:
    name: dinamic-attendance_sqlserver_data
