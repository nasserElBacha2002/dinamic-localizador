services:
  sqlserver:
    ports: !override []

  migrations:
    build:
      target: migrations
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      TZ: ${TZ:?TZ is required}
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_ENCRYPT: ${DB_ENCRYPT:?DB_ENCRYPT is required}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE:?DB_TRUST_SERVER_CERTIFICATE is required}

  backend:
    build:
      target: production
    environment:
      NODE_ENV: ${NODE_ENV:?NODE_ENV is required}
      PORT: ${BACKEND_INTERNAL_PORT:?BACKEND_INTERNAL_PORT is required}
      TZ: ${TZ:?TZ is required}
      FRONTEND_URL: ${FRONTEND_URL:?FRONTEND_URL is required}
      APP_BASE_URL: ${APP_BASE_URL:?APP_BASE_URL is required}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS is required}
      DB_HOST: ${DB_HOST:?DB_HOST is required}
      DB_PORT: ${DB_PORT:?DB_PORT is required}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      DB_ENCRYPT: ${DB_ENCRYPT:?DB_ENCRYPT is required}
      DB_TRUST_SERVER_CERTIFICATE: ${DB_TRUST_SERVER_CERTIFICATE:?DB_TRUST_SERVER_CERTIFICATE is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:?JWT_EXPIRES_IN is required}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:?TWILIO_ACCOUNT_SID is required}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:?TWILIO_AUTH_TOKEN is required}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:?TWILIO_WHATSAPP_NUMBER is required}
      TWILIO_WEBHOOK_URL: ${TWILIO_WEBHOOK_URL:?TWILIO_WEBHOOK_URL is required}
      TWILIO_VALIDATE_SIGNATURE: ${TWILIO_VALIDATE_SIGNATURE:?TWILIO_VALIDATE_SIGNATURE is required}
      BOT_SESSION_TTL_MINUTES: ${BOT_SESSION_TTL_MINUTES:?BOT_SESSION_TTL_MINUTES is required}
      BOT_OPERATION_TIMEZONE: ${BOT_OPERATION_TIMEZONE:?BOT_OPERATION_TIMEZONE is required}
      BOT_DEFAULT_RADIUS_METERS: ${BOT_DEFAULT_RADIUS_METERS:?BOT_DEFAULT_RADIUS_METERS is required}
      BOT_GEOFENCE_REVIEW_MARGIN_METERS: ${BOT_GEOFENCE_REVIEW_MARGIN_METERS:?BOT_GEOFENCE_REVIEW_MARGIN_METERS is required}
      BOT_ON_TIME_GRACE_MINUTES: ${BOT_ON_TIME_GRACE_MINUTES:?BOT_ON_TIME_GRACE_MINUTES is required}
    ports: !override
      - "127.0.0.1:${BACKEND_HOST_PORT}:${BACKEND_INTERNAL_PORT}"
    volumes: !override []

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        VITE_API_URL: ${VITE_API_URL:?VITE_API_URL is required}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY}
        VITE_GOOGLE_MAPS_MAP_ID: ${VITE_GOOGLE_MAPS_MAP_ID}
    environment: !override {}
    ports: !override
      - "127.0.0.1:${FRONTEND_HOST_PORT}:80"
    volumes: !override []
